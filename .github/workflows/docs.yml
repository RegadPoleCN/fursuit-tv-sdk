name: Generate Documentation

on:
  push:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
    contents: read
    pages: write
    id-token: write

env:
  GRADLE_OPTS: "-Dorg.gradle.parallel=true"

jobs:
  generate-docs:
    # 跳过包含 [ci skip] 或 [skip ci] 的提交
    if: github.event_name != 'push' || (!contains(github.event.head_commit.message, '[ci skip]') && !contains(github.event.head_commit.message, '[skip ci]'))
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Validate Gradle Wrapper
      uses: gradle/wrapper-validation-action@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Setup Pages
      uses: actions/configure-pages@v3

    - name: Generate Dokka documentation (HTML)
      run: ./gradlew dokkaGenerate

    - name: Upload pages artifact
      uses: actions/upload-pages-artifact@v3
      if: success()
      with:
        path: build/dokka/html/

    - name: Deploy to github pages
      uses: actions/deploy-pages@v4
      id: deployment
